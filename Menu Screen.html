<!doctype html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap"

<style>
  :root {
    --sky-top: #3a78d6;
    --sky-mid: #5a93e0;
    --sky-low: #8fbbec;
    --cloud-pink: #f7c8d4;
    --cloud-pink-deep: #e89cb0;
    --cloud-pink-line: #d57a96;
    --cloud-white: #ffffff;
    --cloud-shade: #e7eef7;
    --cream: #f6e9cf;
    --cream-deep: #efdcb2;
    --cream-line: #d9b97a;
    --pink: #e07a99;
    --pink-deep: #c95a7d;
    --pink-soft: #fbd9e3;
    --ink: #5a3a4a;
    --sun: #ffe8a8;
    --sun-core: #fff3c4;
    --sun-glow: #ffd66a;
  }

  *, *::before, *::after { box-sizing:border-box; }
  html, body {
    margin:0; padding:0;
    min-height:100%;
    font-family:'Inter', sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  body {
    min-height:100vh;
    background:
      radial-gradient(circle at 85% 12%, rgba(255,240,180,0.45) 0%, rgba(255,240,180,0) 30%),
      linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-low) 100%);
    position:relative;
    overflow:hidden;
  }

  /* ============================================================
     SKY LAYER — sun + drifting pink clouds
     ============================================================ */
  .sky {
    position:fixed; inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }

  /* The sun sits in the top-right corner with a warm soft halo */
  .sun-wrap {
    position:absolute;
    top:-60px; right:-60px;
    width:340px; height:340px;
    filter: drop-shadow(0 0 60px rgba(255, 220, 130, 0.55));
  }
  .sun-wrap svg { width:100%; height:100%; display:block; }

  /* Each cloud is a cluster of ellipses (kept to simple shapes only).
     A pink-tinted variant + a white variant. */
  .cloud {
    position:absolute;
    will-change: transform;
    animation: drift 60s linear infinite;
  }
  .cloud svg { display:block; }
  .cloud.c1 { top:  8%; left:  6%; width:280px; animation-duration:75s; }
  .cloud.c2 { top: 22%; left: 72%; width:220px; animation-duration:60s; animation-delay:-20s; }
  .cloud.c3 { top: 58%; left: -4%; width:310px; animation-duration:90s; animation-delay:-40s; }
  .cloud.c4 { top: 72%; left: 68%; width:260px; animation-duration:80s; animation-delay:-10s; }
  .cloud.c5 { top: 42%; left: 38%; width:180px; opacity:.7;  animation-duration:65s; animation-delay:-30s; }
  .cloud.c6 { top: 86%; left: 18%; width:240px; animation-duration:70s; animation-delay:-50s; }

  @keyframes drift {
    0%   { transform: translateX(0)    translateY(0); }
    50%  { transform: translateX(40px) translateY(-8px); }
    100% { transform: translateX(0)    translateY(0); }
  }

  /* ============================================================
     STAGE — center the menu vertically
     ============================================================ */
  .stage {
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding: 60px 24px;
  }

  /* "back to lock" pill, top-left */
  .back-pill {
    position:fixed; left:24px; top:24px;
    background:rgba(255,255,255,0.35);
    border:1px solid rgba(255,255,255,0.55);
    color:#fff;
    border-radius:99px; padding:8px 16px;
    font-family:'Inter', sans-serif; font-size:11px;
    letter-spacing:3px; text-transform:uppercase;
    text-decoration:none;
    backdrop-filter: blur(6px);
    z-index:10;
    transition: background .2s, transform .2s;
  }
  .back-pill:hover { background:rgba(255,255,255,0.55); transform: translateY(-1px); }

  /* ============================================================
     MENU CARD — cream panel with decorative pink frame
     ============================================================ */
  .menu-card {
    position:relative;
    width:min(640px, 92vw);
    background:
      radial-gradient(ellipse at top, #fbf2dd 0%, var(--cream) 60%, var(--cream-deep) 100%);
    border-radius: 22px;
    padding: 56px 56px 48px;
    box-shadow:
      0 30px 60px -20px rgba(40, 60, 120, 0.45),
      0 12px 24px -12px rgba(40, 60, 120, 0.3),
      inset 0 0 0 1px rgba(217, 185, 122, 0.5);
    isolation:isolate;
  }
  /* Decorative pink double-line frame inset */
  .menu-card::before {
    content:'';
    position:absolute; inset:14px;
    border: 2px solid var(--pink);
    border-radius: 14px;
    pointer-events:none;
  }
  .menu-card::after {
    content:'';
    position:absolute; inset:20px;
    border: 1px solid var(--pink);
    border-radius: 10px;
    opacity:.55;
    pointer-events:none;
  }

  /* Corner ornaments — a small diamond cluster in each corner of the frame */
  .corner {
    position:absolute;
    width:34px; height:34px;
    z-index:2;
    pointer-events:none;
  }
  .corner svg { width:100%; height:100%; display:block; }
  .corner.tl { top:4px;    left:4px; }
  .corner.tr { top:4px;    right:4px;  transform: scaleX(-1); }
  .corner.bl { bottom:4px; left:4px;   transform: scaleY(-1); }
  .corner.br { bottom:4px; right:4px;  transform: scale(-1,-1); }

  /* Header */
  .menu-header {
    text-align:center;
    margin-bottom: 28px;
  }
  .eyebrow {
    display:inline-flex; align-items:center; gap:10px;
    font-family:'Inter', sans-serif;
    font-size:10px; letter-spacing:5px; text-transform:uppercase;
    color: var(--pink-deep);
    font-weight:500;
  }
  .eyebrow .tick {
    display:inline-block; width:18px; height:1px; background:var(--pink);
  }
  .menu-title {
    font-family:'Cormorant Garamond', serif;
    font-weight:500; font-style:italic;
    font-size: clamp(34px, 5vw, 48px);
    color: var(--pink-deep);
    margin: 10px 0 2px;
    line-height:1.05;
    letter-spacing:.5px;
  }
  .menu-sub {
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size: 15px;
    color: rgba(90, 58, 74, 0.7);
    margin: 0;
  }

  /* ============================================================
     MENU BUTTONS — clean white pills with pink accents
     ============================================================ */
  .menu-list {
    list-style:none; padding:0; margin: 14px 0 0;
    display:flex; flex-direction:column;
    gap: 14px;
  }
  .menu-list li { display:block; }

  .menu-btn {
    position:relative;
    display:flex; align-items:center; gap:18px;
    width:100%;
    background:#ffffff;
    border: 1.5px solid var(--pink);
    border-radius: 14px;
    padding: 18px 22px;
    cursor:pointer;
    font: inherit; color: var(--ink);
    text-align:left;
    box-shadow:
      0 4px 0 0 var(--pink-soft),
      0 8px 18px -8px rgba(40,60,120,0.18);
    transition: transform .2s cubic-bezier(.2,.7,.3,1),
                box-shadow .2s ease,
                background .2s ease;
  }
  .menu-btn:hover {
    transform: translateY(-2px);
    background: #fff;
    box-shadow:
      0 6px 0 0 var(--pink),
      0 12px 22px -10px rgba(40,60,120,0.22);
  }
  .menu-btn:active {
    transform: translateY(1px);
    box-shadow:
      0 2px 0 0 var(--pink-soft),
      0 4px 10px -6px rgba(40,60,120,0.18);
  }

  .menu-btn .num {
    flex: none;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--pink-soft);
    color: var(--pink-deep);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .menu-btn .label {
    flex: 1 1 auto;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 16px;
    color: var(--ink);
    letter-spacing: .2px;
  }
  .menu-btn .arrow {
    flex: none;
    color: var(--pink);
    font-size: 20px;
    transform: translateX(0);
    transition: transform .25s cubic-bezier(.2,.7,.3,1);
  }
  .menu-btn:hover .arrow { transform: translateX(4px); }

  /* Footer line under the buttons */
  .menu-foot {
    margin-top: 28px;
    text-align:center;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:14px;
    color: var(--pink-deep);
    opacity: .8;
  }
  .menu-foot .heart {
    color: var(--pink);
    margin: 0 4px;
  }

  /* Entry animation */
  .menu-card {
    animation: cardIn .9s cubic-bezier(.2,.7,.3,1) both;
  }
  .menu-header { animation: rise .8s cubic-bezier(.2,.7,.3,1) .25s both; }
  .menu-list li {
    opacity:0;
    animation: rise .8s cubic-bezier(.2,.7,.3,1) both;
  }
  .menu-list li:nth-child(1) { animation-delay: .40s; }
  .menu-list li:nth-child(2) { animation-delay: .52s; }
  .menu-list li:nth-child(3) { animation-delay: .64s; }
  .menu-list li:nth-child(4) { animation-delay: .76s; }
  .menu-foot { animation: rise .8s cubic-bezier(.2,.7,.3,1) .9s both; }

  @keyframes cardIn {
    from { opacity:0; transform: translateY(20px) scale(.97); }
    to   { opacity:1; transform: translateY(0)   scale(1); }
  }
  @keyframes rise {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 540px) {
    .menu-card { padding: 44px 24px 36px; }
    .menu-btn { padding: 16px 18px; }
    .menu-btn .label { font-size: 15px; }
    .sun-wrap { width:240px; height:240px; top:-40px; right:-40px; }
  }
</style>
</head>
